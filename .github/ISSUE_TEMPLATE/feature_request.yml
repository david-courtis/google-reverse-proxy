name: Feature request
description: Propose a new capability or a meaningful improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is awkward?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like the proxy to do, and how would a user invoke it?
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      multiple: true
      options:
        - OpenAI HTTP API
        - Account pool / rotation
        - Dashboard
        - Code Assist (CLI) bridge
        - AI Studio (API key) bridge
        - Antigravity bridge (planned)
        - Build / CI / packaging
        - Docs
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried or other shapes you rejected and why.
