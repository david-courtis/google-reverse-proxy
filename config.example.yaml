# Google Reverse Proxy configuration.
# Copy this file to config.yaml and edit. Environment variables override every field.
# The proxy looks for config.yaml in (1) CONFIG_PATH if set, (2) the current
# working directory, (3) $GEMINI_CLI_OPENAI_HOME (default ~/.gemini-cli-openai).

server:
  port: 8787
  host: 0.0.0.0
  bearer_token: null      # auto-generated and persisted if null
  cors_allowed_origins:
    - http://localhost:8787

accounts:
  oauth: null             # paste OAuth credentials JSON (one object or an array)
  api_keys: []            # list of Google AI Studio API keys
  project_id: null        # pin a Cloud project (single OAuth account only)

pool:
  selection_strategy: random      # random, round-robin, failover
  cooldown_seconds: 90
  preferred_account_kind: cli     # cli, api
  api_key_daily_quota: 500
  enable_auto_model_switching: false

thinking:
  enabled: false                  # ask Gemini for step-by-step reasoning
  stream_inline: false            # stream as <thinking> blocks DeepSeek-R1 style

native_tools:
  enabled: false                  # master switch for Gemini's built-in tools
  google_search: false
  url_context: false
  priority: mixed                 # native, custom, mixed
  default_to_native: true
  allow_request_control: true

citations:
  inline_markers: false           # inline [n] markers per grounded citation
  grounding_metadata: true        # attach full grounding metadata on stream chunks
  search_entry_point: false       # include search-suggestion entry point

# Safety thresholds, one of OFF, BLOCK_NONE, BLOCK_FEW, BLOCK_SOME, BLOCK_ONLY_HIGH,
# HARM_BLOCK_THRESHOLD_UNSPECIFIED. null means Google default.
moderation:
  harassment: null
  hate_speech: null
  sexually_explicit: null
  dangerous_content: null

# Upstream overrides. Changing user_agent or goog_api_client breaks byte-identical parity.
upstream:
  api_base_url: null              # default https://generativelanguage.googleapis.com
  proxy: null
  user_agent: null
  goog_api_client: null

logging:
  debug: false
  level: info
